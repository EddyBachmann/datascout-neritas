<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedMax Unificado - Pesquisa Multi-Plataforma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', sans-serif;
            background: #1E1E1E;
            color: #F0F0F0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #272727 0%, #1E1E1E 100%);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid #383838;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #00C8FF;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .search-card {
            background: #272727;
            border: 1px solid #383838;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            background: #2E2E2E;
            border: 1px solid #383838;
            border-radius: 10px;
            color: #F0F0F0;
            font-size: 15px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #00C8FF;
            box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
        }

        .btn-search {
            padding: 14px 28px;
            background: #00C8FF;
            color: #0A0A0A;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-search:hover {
            background: #00AEDD;
            transform: translateY(-2px);
        }

        .platform-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .platform-chip {
            padding: 8px 18px;
            background: #2E2E2E;
            border: 1px solid #383838;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .platform-chip:hover {
            border-color: #00C8FF;
        }

        .platform-chip.selected {
            background: rgba(0,200,255,0.15);
            border-color: #00C8FF;
            color: #00C8FF;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: #272727;
            border: 1px solid #383838;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #00C8FF;
        }

        .metric-label {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .top-post {
            background: linear-gradient(135deg, rgba(0,200,255,0.08) 0%, #272727 100%);
            border: 2px solid #00C8FF;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .top-post h3 {
            margin-bottom: 16px;
            font-size: 20px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-item {
            background: #2E2E2E;
            border: 1px solid #383838;
            border-radius: 10px;
            padding: 16px;
            transition: all 0.2s;
        }

        .result-item:hover {
            transform: translateX(5px);
            border-color: #00C8FF;
        }

        .result-platform {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .result-stats {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #888;
        }

        .caption-card {
            background: #272727;
            border: 1px solid #383838;
            border-radius: 12px;
            padding: 24px;
        }

        .caption-text {
            background: #2E2E2E;
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 16px;
        }

        .hashtags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .hashtag {
            padding: 4px 12px;
            background: rgba(0,200,255,0.1);
            color: #00C8FF;
            border-radius: 20px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #383838;
            border-top-color: #00C8FF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00C8FF;
            color: #0A0A0A;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 FeedMax Unificado</h1>
            <div class="subtitle">Pesquise tendências virais em 6 plataformas simultaneamente</div>
        </div>

        <div class="search-card">
            <div class="search-box">
                <input type="text" id="tema" class="search-input" placeholder="Digite um tema para pesquisar... Ex: inteligência artificial, fitness, marketing, longevidade">
                <button class="btn-search" id="btnPesquisar">🔍 PESQUISAR AGORA</button>
            </div>

            <div class="platform-grid" id="platformGrid">
                <div class="platform-chip selected" data-platform="Instagram">📸 Instagram</div>
                <div class="platform-chip selected" data-platform="TikTok">🎵 TikTok</div>
                <div class="platform-chip selected" data-platform="X (Twitter)">🐦 X (Twitter)</div>
                <div class="platform-chip" data-platform="LinkedIn">💼 LinkedIn</div>
                <div class="platform-chip" data-platform="Reddit">🤖 Reddit</div>
                <div class="platform-chip selected" data-platform="YouTube">🎥 YouTube</div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>🔍 Pesquisando nas plataformas selecionadas...</p>
            <p style="font-size: 12px; color: #888; margin-top: 8px;">Isso pode levar alguns segundos</p>
        </div>

        <div id="results"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Estado da aplicação
        let selectedPlatforms = ['Instagram', 'TikTok', 'X (Twitter)', 'YouTube'];
        let currentResults = null;

        // Elementos DOM
        const temaInput = document.getElementById('tema');
        const btnPesquisar = document.getElementById('btnPesquisar');
        const loadingDiv = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const toastDiv = document.getElementById('toast');

        // Inicializar seleção de plataformas
        document.querySelectorAll('.platform-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const platform = chip.dataset.platform;
                if (selectedPlatforms.includes(platform)) {
                    selectedPlatforms = selectedPlatforms.filter(p => p !== platform);
                    chip.classList.remove('selected');
                } else {
                    selectedPlatforms.push(platform);
                    chip.classList.add('selected');
                }
            });
        });

        // Mostrar toast
        function showToast(message, isError = false) {
            toastDiv.textContent = message;
            toastDiv.style.background = isError ? '#FF5A5A' : '#00C8FF';
            toastDiv.style.display = 'block';
            setTimeout(() => {
                toastDiv.style.display = 'none';
            }, 3000);
        }

        // Formatar números
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Escapar HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Função principal de pesquisa
        async function pesquisar() {
            const tema = temaInput.value.trim();
            
            if (!tema) {
                showToast('⚠️ Digite um tema para pesquisar!', true);
                return;
            }

            if (selectedPlatforms.length === 0) {
                showToast('⚠️ Selecione pelo menos uma plataforma!', true);
                return;
            }

            // Mostrar loading
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            btnPesquisar.disabled = true;

            try {
                const response = await fetch('/api/content/search-multi-platform', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tema: tema,
                        plataformas: selectedPlatforms
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Erro na pesquisa');
                }

                currentResults = data;
                renderResults(data, tema);
                showToast(`✅ Encontrados ${data.totalPosts} posts em ${Object.keys(data.results).length} plataformas!`);
                
            } catch (error) {
                console.error('Erro na pesquisa:', error);
                resultsDiv.innerHTML = `
                    <div class="search-card">
                        <p style="color: #FF5A5A; text-align: center;">
                            ❌ Erro ao pesquisar: ${error.message}
                        </p>
                        <p style="color: #888; text-align: center; margin-top: 10px;">
                            Verifique se o servidor está rodando em http://localhost:3001
                        </p>
                    </div>
                `;
                showToast('❌ Erro na pesquisa: ' + error.message, true);
            } finally {
                loadingDiv.style.display = 'none';
                btnPesquisar.disabled = false;
            }
        }

        // Renderizar resultados
        function renderResults(data, tema) {
            let html = '';

            // Métricas
            html = `
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value">${data.totalPosts}</div>
                        <div class="metric-label">Total de Posts</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${Object.keys(data.results).length}</div>
                        <div class="metric-label">Plataformas</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${formatNumber(data.totalEngagement)}</div>
                        <div class="metric-label">Engajamento Total</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">✨</div>
                        <div class="metric-label">Análise Concluída</div>
                    </div>
                </div>
            `;

            // Top Post
            if (data.topPosts && data.topPosts[0]) {
                const top = data.topPosts[0];
                html += `
                    <div class="top-post">
                        <h3>🏆 POST MAIS VIRAL (${top.fonte})</h3>
                        <div class="result-text">${escapeHtml(top.texto)}</div>
                        <div class="result-stats">
                            <span>❤️ ${formatNumber(top.curtidas)} curtidas</span>
                            <span>💬 ${formatNumber(top.comentarios)} comentários</span>
                            ${top.compartilhamentos ? `<span>🔄 ${formatNumber(top.compartilhamentos)} compartilhamentos</span>` : ''}
                        </div>
                    </div>
                `;
            }

            // Lista de resultados
            if (data.topPosts && data.topPosts.length > 1) {
                html += `<div class="search-card"><h3 style="margin-bottom: 16px;">📊 TODOS OS POSTS ENCONTRADOS</h3><div class="results-list">`;
                
                data.topPosts.slice(1, 11).forEach((post, idx) => {
                    const platformColors = {
                        'Instagram': '#E4405F',
                        'TikTok': '#888',
                        'X (Twitter)': '#1DA1F2',
                        'LinkedIn': '#0A66C2',
                        'Reddit': '#FF4500',
                        'YouTube': '#FF0000'
                    };
                    
                    html += `
                        <div class="result-item">
                            <div class="result-platform" style="background: ${platformColors[post.fonte] || '#888'}20; color: ${platformColors[post.fonte] || '#888'}">
                                ${post.fonte}
                            </div>
                            <div class="result-text">${escapeHtml(post.texto)}</div>
                            <div class="result-stats">
                                <span>❤️ ${formatNumber(post.curtidas)}</span>
                                <span>💬 ${formatNumber(post.comentarios)}</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }

            // Legenda Viral
            html += `
                <div class="caption-card">
                    <h3 style="margin-bottom: 16px;">📱 LEGENDA VIRAL PRONTA</h3>
                    <div class="caption-text" id="legendaTexto">Gerando legenda...</div>
                    <div class="hashtags" id="hashtagsContainer"></div>
                    <button class="btn-search" onclick="copiarLegenda()" style="width: 100%; margin-top: 10px;">📋 COPIAR LEGENDA</button>
                </div>
            `;

            resultsDiv.innerHTML = html;

            // Gerar legenda
            gerarLegenda(tema, data.topPosts[0]);
        }

        // Gerar legenda viral
        async function gerarLegenda(tema, topPost) {
            try {
                const response = await fetch('/api/content/generate-viral-caption', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tema: tema,
                        post: topPost,
                        plataforma: topPost?.fonte
                    })
                });

                const data = await response.json();
                
                const legendaEl = document.getElementById('legendaTexto');
                if (legendaEl) {
                    legendaEl.innerHTML = data.legenda.replace(/\n/g, '<br>');
                }
                
                const hashtagsContainer = document.getElementById('hashtagsContainer');
                if (hashtagsContainer && data.hashtags) {
                    hashtagsContainer.innerHTML = '';
                    data.hashtags.forEach(h => {
                        hashtagsContainer.innerHTML += `<span class="hashtag">${h}</span>`;
                    });
                }
                
                window.legendaAtual = data.legenda;
                
            } catch (error) {
                console.error('Erro ao gerar legenda:', error);
                const legendaEl = document.getElementById('legendaTexto');
                if (legendaEl) {
                    legendaEl.innerHTML = `📢 ${tema} está bombando! O que você achou? Comenta aqui! 👇\n\n#${tema.replace(/ /g, '')} #viral #trending #explore #fyp`;
                }
                window.legendaAtual = `📢 ${tema} está bombando! O que você achou? Comenta aqui! 👇\n\n#${tema.replace(/ /g, '')} #viral #trending #explore #fyp`;
            }
        }

        // Copiar legenda
        window.copiarLegenda = function() {
            if (window.legendaAtual) {
                navigator.clipboard.writeText(window.legendaAtual);
                showToast('✅ Legenda copiada para a área de transferência!');
            } else {
                showToast('⚠️ Aguarde a legenda ser gerada primeiro!', true);
            }
        };

        // Eventos
        btnPesquisar.addEventListener('click', pesquisar);
        temaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') pesquisar();
        });
    </script>
</body>
</html>
